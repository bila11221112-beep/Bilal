<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Tech AD Toolkit Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Anta&family=Russo+One&family=Nova+Square&family=Keania+One&family=Orbitron:wght@400;700&family=Rajdhani:wght@400;700&family=Electrolize&family=Exo+2:wght@400;700&family=Saira:wght@400;700&family=Titillium+Web:wght@400;700&family=Play:wght@400;700&family=Aldrich&family=Black+Ops+One&family=Monoton&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #00d4ff;
            --bg: #050510;
            --card: #101025;
            --success: #39ff14;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Anta', sans-serif;
            background: radial-gradient(circle at top, #0a0a2a 0%, #050510 45%, #02020a 100%);
            color: white;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Soft animated glow in the background */
        body::before {
            content: "";
            position: fixed;
            inset: -20%;
            background:
                radial-gradient(circle at 10% 0%, rgba(0, 212, 255, 0.25), transparent 60%),
                radial-gradient(circle at 90% 20%, rgba(0, 110, 255, 0.3), transparent 60%),
                radial-gradient(circle at 50% 100%, rgba(0, 0, 80, 0.6), transparent 65%);
            opacity: 0.9;
            filter: blur(8px);
            z-index: -1;
            animation: bgFloat 18s ease-in-out infinite alternate;
        }

        h1 {
            font-family: 'Audiowide';
            font-size: 1.5rem;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent), 0 0 25px rgba(0, 212, 255, 0.9);
            text-align: center;
            margin: 10px 0 4px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            animation: titleGlow 3.2s ease-in-out infinite;
        }

        /* Decorative animated stars line under header */
        .stars-line {
            text-align: center;
            margin: 0 0 12px;
            font-size: 0.72rem;
            letter-spacing: 0.45em;
            color: rgba(255, 255, 255, 0.85);
            text-transform: uppercase;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .stars-line span {
            background: linear-gradient(90deg, rgba(0, 212, 255, 0.2), #ffffff, rgba(0, 212, 255, 0.2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: starsShimmer 4s linear infinite;
        }

        .stars-line::before,
        .stars-line::after {
            content: "";
            height: 1px;
            flex: 1;
            max-width: 80px;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(0, 212, 255, 0.6),
                rgba(0, 212, 255, 0.15),
                transparent
            );
            opacity: 0.9;
        }

        .container {
            max-width: 500px;
            margin: 10px auto 30px;
            background: radial-gradient(circle at top, #181838 0%, #101025 55%, #070714 100%);
            border: 1px solid #1e1e3f;
            border-radius: 18px;
            padding: 16px 15px 18px;
            box-shadow:
                0 22px 40px rgba(0, 0, 0, 0.85),
                0 0 0 1px rgba(0, 212, 255, 0.06);
            position: relative;
            overflow: hidden;
            animation: cardFloat 8s ease-in-out infinite alternate;
        }

        .container::before {
            content: "";
            position: absolute;
            inset: -40%;
            background: conic-gradient(
                from 140deg,
                rgba(0, 212, 255, 0.4),
                transparent,
                rgba(0, 212, 255, 0.05),
                transparent,
                rgba(0, 212, 255, 0.35)
            );
            opacity: 0.25;
            mix-blend-mode: screen;
            filter: blur(20px);
            z-index: -1;
            animation: holoSweep 18s linear infinite;
        }

        .section-title {
            font-size: 0.9rem;
            color: var(--accent);
            text-align: left;
            margin: 18px 0 8px 5px;
            text-transform: uppercase;
            font-weight: bold;
            border-left: 3px solid var(--accent);
            padding-left: 8px;
            letter-spacing: 0.08em;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            position: relative;
            overflow: hidden;
        }

        .section-title::after {
            content: "";
            position: absolute;
            left: -40%;
            bottom: 0;
            width: 140%;
            height: 1px;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(0, 212, 255, 0.8),
                transparent
            );
            opacity: 0.35;
            animation: sectionUnderline 6s linear infinite;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 0.85rem;
            font-family: inherit;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, transform 0.1s ease;
        }

        input:focus,
        select:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 1px rgba(0, 212, 255, 0.4), 0 0 20px rgba(0, 212, 255, 0.18);
            background: radial-gradient(circle at top, #03030b, #000);
            transform: translateY(-1px);
        }

        .tool-card {
            background: radial-gradient(circle at top left, #19193a 0%, #0a0a1a 40%, #050514 100%);
            padding: 12px 12px 10px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid #1e1e3f;
            position: relative;
            box-shadow: 0 0 0 1px rgba(0, 212, 255, 0.04);
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .tool-card:hover {
            transform: translateY(-2px);
            border-color: rgba(0, 212, 255, 0.6);
            box-shadow:
                0 16px 25px rgba(0, 0, 0, 0.8),
                0 0 18px rgba(0, 212, 255, 0.35);
        }

        /* Smaller close button, properly inside corner */
        .del-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            background: radial-gradient(circle at 30% 30%, #ff7070, #ff3131);
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 999px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5;
            border: 1px solid rgba(5, 5, 16, 0.9);
            box-shadow: 0 0 10px rgba(255, 49, 49, 0.6);
            transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.14s ease;
            opacity: 0.95;
        }

        .del-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 14px rgba(255, 49, 49, 0.9);
            opacity: 1;
        }

        .del-btn:active {
            transform: scale(0.9);
            box-shadow: 0 0 6px rgba(255, 49, 49, 0.7);
        }

        /* REQUESTED: blue–white–blue gradient generate button */
        .gen-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(
                90deg,
                #007bff 0%,
                #ffffff 50%,
                #007bff 100%
            );
            color: #000;
            border: none;
            border-radius: 30px;
            font-family: 'Russo One';
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 22px;
            box-shadow:
                0 0 20px rgba(0, 123, 255, 0.55),
                0 0 35px rgba(0, 123, 255, 0.45);
            text-transform: uppercase;
            letter-spacing: 0.09em;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s ease, box-shadow 0.18s ease, filter 0.18s ease;
        }

        .gen-btn::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(
                120deg,
                transparent 0%,
                rgba(255, 255, 255, 0.7) 45%,
                rgba(255, 255, 255, 0.7) 55%,
                transparent 100%
            );
            opacity: 0;
            transform: translateX(-120%);
            mix-blend-mode: screen;
        }

        .gen-btn:hover {
            transform: translateY(-1px) scale(1.01);
            box-shadow:
                0 0 25px rgba(0, 123, 255, 0.85),
                0 0 55px rgba(0, 123, 255, 0.65);
            filter: saturate(1.15);
        }

        .gen-btn:hover::before {
            opacity: 1;
            animation: buttonShine 1.6s ease-out;
        }

        .gen-btn:active {
            transform: translateY(1px) scale(0.98);
            box-shadow:
                0 0 14px rgba(0, 123, 255, 0.8),
                0 0 30px rgba(0, 123, 255, 0.5);
        }

        #loader {
            display: none;
            margin: 20px 0;
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(0, 212, 255, 0.1);
            border-top: 5px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        #output-section {
            display: none;
            margin-top: 20px;
            text-align: center;
            padding: 20px;
            border-top: 1px solid #333;
        }

        .action-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .action-btn {
            flex: 1;
            min-width: 80px;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 0.8rem;
            transition: transform 0.12s ease, box-shadow 0.15s ease;
        }

        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.6);
        }

        .btn-run {
            background: #28a745;
            color: white;
        }

        .btn-copy {
            background: #007bff;
            color: white;
        }

        .btn-dl {
            background: #ffc107;
            color: #000;
        }

        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 50px;
            padding: 16px;
            position: fixed;
            z-index: 10000;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        .icon-input-wrapper {
            position: relative;
            display: block;
            width: 100%;
        }

        .tool-icon {
            padding-right: 70px !important;
        }

        .icon-picker-btn {
            position: absolute;
            right: 8px;
            top: 8px;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 2;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
            transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
        }

        .icon-picker-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.8);
            background: #00f0ff;
        }

        .icon-picker-btn:active {
            transform: translateY(1px) scale(0.97);
        }

        #iconPickerModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top, rgba(0, 0, 0, 0.97), rgba(0, 0, 0, 0.98));
            z-index: 10001;
            overflow-y: auto;
            padding: 20px;
        }

        #iconPickerModal.show {
            display: block;
        }

        .icon-picker-container {
            max-width: 600px;
            margin: 20px auto;
            background: var(--card);
            border: 2px solid var(--accent);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.85);
            animation: modalPop 0.32s ease-out;
        }

        .icon-picker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .icon-picker-header h3 {
            color: var(--accent);
            margin: 0;
            font-size: 1.2rem;
        }

        .icon-picker-close {
            background: #ff3131;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .icon-search-box {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid var(--accent);
            border-radius: 8px;
            color: white;
            margin-bottom: 15px;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }

        .icon-item {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
        }

        .icon-item:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: var(--accent);
            transform: scale(1.1);
        }

        .icon-item i {
            font-size: 1.5rem;
            color: var(--accent);
        }

        .icon-item.selected {
            background: rgba(0, 212, 255, 0.3);
            border-color: var(--accent);
        }

        /* Animations */
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fadein {
            from {
                bottom: 0;
                opacity: 0;
            }
            to {
                bottom: 30px;
                opacity: 1;
            }
        }

        @keyframes fadeout {
            from {
                bottom: 30px;
                opacity: 1;
            }
            to {
                bottom: 0;
                opacity: 0;
            }
        }

        @keyframes titleGlow {
            0% {
                text-shadow:
                    0 0 8px rgba(0, 212, 255, 0.65),
                    0 0 16px rgba(0, 212, 255, 0.75),
                    0 0 32px rgba(0, 212, 255, 0.5);
            }
            50% {
                text-shadow:
                    0 0 16px rgba(0, 212, 255, 0.95),
                    0 0 34px rgba(0, 212, 255, 0.95),
                    0 0 60px rgba(0, 212, 255, 0.9);
            }
            100% {
                text-shadow:
                    0 0 8px rgba(0, 212, 255, 0.65),
                    0 0 16px rgba(0, 212, 255, 0.75),
                    0 0 32px rgba(0, 212, 255, 0.5);
            }
        }

        @keyframes starsShimmer {
            0% {
                transform: translateX(-4px);
                opacity: 0.7;
            }
            50% {
                transform: translateX(4px);
                opacity: 1;
            }
            100% {
                transform: translateX(-4px);
                opacity: 0.7;
            }
        }

        @keyframes cardFloat {
            0% {
                transform: translateY(0) scale(1);
                box-shadow:
                    0 22px 40px rgba(0, 0, 0, 0.85),
                    0 0 0 1px rgba(0, 212, 255, 0.06);
            }
            50% {
                transform: translateY(-4px) scale(1.01);
                box-shadow:
                    0 26px 48px rgba(0, 0, 0, 0.9),
                    0 0 0 1px rgba(0, 212, 255, 0.1);
            }
            100% {
                transform: translateY(-2px) scale(1.005);
                box-shadow:
                    0 24px 44px rgba(0, 0, 0, 0.88),
                    0 0 0 1px rgba(0, 212, 255, 0.08);
            }
        }

        @keyframes holoSweep {
            0% {
                transform: translate3d(-10%, -10%, 0) rotate(0deg);
            }
            100% {
                transform: translate3d(10%, 10%, 0) rotate(360deg);
            }
        }

        @keyframes buttonShine {
            0% {
                transform: translateX(-120%);
                opacity: 0;
            }
            30% {
                opacity: 1;
            }
            100% {
                transform: translateX(120%);
                opacity: 0;
            }
        }

        @keyframes bgFloat {
            0% {
                transform: translate3d(0, 0, 0) scale(1);
            }
            100% {
                transform: translate3d(0, -12px, 0) scale(1.03);
            }
        }

        @keyframes sectionUnderline {
            0% {
                transform: translateX(-40%);
            }
            100% {
                transform: translateX(40%);
            }
        }

        @keyframes modalPop {
            0% {
                transform: translateY(18px) scale(0.96);
                opacity: 0;
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .container {
                border-radius: 16px;
                padding: 14px 12px 18px;
            }

            h1 {
                font-size: 1.35rem;
            }

            .gen-btn {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="stars-line">
    <span>✦ ✦ ✦</span>
</div>

else if(anim==='confetti')animCode=`const c=document.getElementById('bg');const x=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;const cols=['${color}','#ff0080','#00ff80','#ffff00'];const pc=Array(100).fill().map(()=>({x:Math.random()*c.width,y:Math.random()*c.height-c.height,r:3+Math.random()*5,color:cols[Math.floor(Math.random()*cols.length)],rot:Math.random()*Math.PI*2,vr:(Math.random()-0.5)*0.2,vy:2+Math.random()*2,vx:(Math.random()-0.5)}));function a(){x.fillStyle='rgba(0,0,0,0.05)';x.fillRect(0,0,c.width,c.height);pc.forEach(p=>{p.y+=p.vy;p.x+=p.vx;p.rot+=p.vr;if(p.y>c.height){p.y=-p.r;p.x=Math.random()*c.width}x.save();x.translate(p.x,p.y);x.rotate(p.rot);x.fillStyle=p.color;x.fillRect(-p.r/2,-p.r/2,p.r,p.r);x.restore()});requestAnimationFrame(a)}a();`;
else if(anim==='hexagons')animCode=`const c=document.getElementById('bg');const x=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;const sz=30;let t=0;function dH(X,Y,r,al){x.beginPath();for(let i=0;i<6;i++){const ang=(Math.PI/3)*i;const hx=X+r*Math.cos(ang);const hy=Y+r*Math.sin(ang);if(i===0)x.moveTo(hx,hy);else x.lineTo(hx,hy)}x.closePath();x.strokeStyle='${color}';x.globalAlpha=al;x.stroke();x.globalAlpha=1}function a(){x.fillStyle='rgba(0,0,0,0.1)';x.fillRect(0,0,c.width,c.height);t+=0.02;for(let y=0;y<c.height+sz;y+=sz*1.5){for(let X=0;X<c.width+sz;X+=sz*Math.sqrt(3)){const off=(Math.floor(y/(sz*1.5))%2)*(sz*Math.sqrt(3)/2);const al=(Math.sin(t+X*0.01+y*0.01)+1)/2;dH(X+off,y,sz/2,al*0.5)}}requestAnimationFrame(a)}a();`;
